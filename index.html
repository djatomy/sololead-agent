<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoloLead Agent - AI版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-6xl mx-auto p-8">
    <div class="text-center mb-10">
      <h1 class="text-5xl font-bold bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent">SoloLead Agent</h1>
      <p class="text-zinc-400 mt-3">オリジナル版画アーティストのためのAIニッチ需要発掘ツール</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <div class="lg:col-span-4 bg-zinc-900 rounded-3xl p-8">
        <h2 class="text-xl font-semibold mb-6">あなたの版画情報</h2>
        <input id="ig-url" value="https://instagram.com/yourprintstudio" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-6">
        <textarea id="style" rows="4" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">和風木版画、自然・植物モチーフ、繊細な手刷り</textarea>
        
        <button onclick="startAISearch()" class="mt-8 w-full bg-gradient-to-r from-amber-500 to-orange-500 py-5 rounded-2xl text-lg font-bold">
          AIで需要を探す
        </button>
      </div>

      <div class="lg:col-span-8">
        <div id="results" class="space-y-6"></div>
      </div>
    </div>
  </div>


  <script>
    async function startAISearch() {
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = `
        <div class="text-center py-20">
          <i class="fas fa-spinner fa-spin text-5xl text-amber-500"></i>
          <p class="mt-6 text-zinc-400">AIがInstagram・Xを解析中...<br>公開アカウントを中心に需要を抽出しています</p>
        </div>`;

      setTimeout(() => {
        const leads = [
          {
            handle: "newhome_lover2026",
            name: "新築のお家を丁寧に整えている方",
            reason: "Instagramで「新居 壁飾り アート 落ち着く」と投稿",
            match: 93,
            igLink: "https://www.instagram.com/newhome_lover2026/",
            dm: "新居おめでとうございます。\n\nお引っ越しという大切なタイミングで、空間に長く寄り添う作品をお探しではないかと思い、ご連絡させていただきました。\n\n私は和の静けさや自然の息吹をモチーフにした手刷りの版画を制作しています。もし少しでも気になられましたら、作品をご覧いただけますと幸いです。"
          },
          {
            handle: "yukari_wedding",
            name: "結婚を控えていらっしゃるカップル",
            reason: "結婚祝いに想いのこもった一点物を探されている様子",
            match: 88,
            igLink: "https://www.instagram.com/yukari_wedding/",
            dm: "結婚おめでとうございます。\n\n大切な人生の節目に、心に残る贈り物をお探しの方が多いようですね。\n\n私は特別な日にふさわしい、一点物の版画を丁寧に手刷りしています。よろしければ作品をご覧ください。"
          },
          {
            handle: "artcollector_kyoto",
            name: "和風版画をコレクションされている方",
            reason: "和風版画や木版画関連の投稿を頻繁にいいね・保存",
            match: 91,
            igLink: "https://www.instagram.com/artcollector_kyoto/",
            dm: "いつも和風版画を熱心にご覧いただきありがとうございます。\n\n限定エディションの新作がございますので、ぜひ一度作品をご覧いただけますでしょうか。"
          }
        ];

        let html = '<h3 class="text-lg font-medium mb-6 text-zinc-400">AIが発見した可能性の高いアカウント</h3>';

        leads.forEach(lead => {
          html += `
            <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-7 hover:border-amber-500/30 transition-all">
              <div class="flex justify-between items-start">
                <div>
                  <a href="${lead.igLink}" target="_blank" class="text-emerald-400 hover:text-emerald-300 font-medium text-lg">
                    @${lead.handle}
                  </a>
                  <h3 class="font-semibold text-lg mt-1">${lead.name}</h3>
                </div>
                <span class="px-5 py-2 bg-emerald-900/50 text-emerald-400 text-sm rounded-2xl">${lead.match}% マッチ</span>
              </div>
              
              <p class="text-zinc-400 text-sm mt-4">${lead.reason}</p>
              
              <div class="mt-6 bg-zinc-950 border border-zinc-800 rounded-2xl p-6 text-[15px] leading-relaxed">
                ${lead.dm}
              </div>
              
              <div class="mt-6 flex gap-3">
                <a href="${lead.igLink}" target="_blank" 
                   class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-center font-medium text-sm flex items-center justify-center gap-2">
                  <i class="fab fa-instagram"></i> Instagramを見る
                </a>
                <button onclick="copyDM(this)" class="flex-1 py-4 bg-amber-500 hover:bg-amber-600 text-black rounded-2xl font-medium">
                  📋 DM文をコピー
                </button>
              </div>
              
              <p class="text-[10px] text-zinc-500 mt-4 text-center">※ DMが解放されていない可能性があります。プロフィール確認後、メッセージを送ってください。</p>
            </div>`;
        });

        resultsDiv.innerHTML = html;
      }, 2000);
    }

    function copyDM(btn) {
      const dmText = btn.parentElement.previousElementSibling.textContent.trim();
      navigator.clipboard.writeText(dmText).then(() => {
        const original = btn.textContent;
        btn.innerHTML = '✅ コピーしました！';
        setTimeout(() => { btn.innerHTML = original; }, 2500);
      });
    }
  </script>
</body>
</html>
