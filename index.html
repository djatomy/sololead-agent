<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoloLead Agent - AI版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-6xl mx-auto p-8">
    <div class="text-center mb-10">
      <h1 class="text-5xl font-bold bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent">SoloLead Agent</h1>
      <p class="text-zinc-400 mt-3">オリジナル版画アーティストのためのAIニッチ需要発掘ツール</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <div class="lg:col-span-4 bg-zinc-900 rounded-3xl p-8">
        <h2 class="text-xl font-semibold mb-6">あなたの版画情報</h2>
        <input id="ig-url" value="https://instagram.com/yourprintstudio" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-6">
        <textarea id="style" rows="4" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">和風木版画、自然・植物モチーフ、繊細な手刷り</textarea>
        
        <button onclick="startAISearch()" class="mt-8 w-full bg-gradient-to-r from-amber-500 to-orange-500 py-5 rounded-2xl text-lg font-bold">
          AIで需要を探す
        </button>
        
        <button id="downloadBtn" onclick="downloadLeads()" class="mt-3 w-full bg-zinc-700 hover:bg-zinc-600 py-3 rounded-2xl text-sm font-medium hidden">
          📥 結果をダウンロード
        </button>
      </div>

      <div class="lg:col-span-8">
        <div id="results" class="space-y-6"></div>
      </div>
    </div>
  </div>


  <script>
    let currentLeads = [];

    // ペルソナデータベース（50+カテゴリ）
    const personaDatabase = [
      // インテリア関連
      { handle: "interior_kyoto_design", name: "京都の高級インテリアデザイナー", segment: "インテリア", keywords: ["インテリア", "新築", "和", "デザイン", "壁飾り", "装飾"], match: 0, igLink: "https://www.instagram.com/interior_kyoto_design/", dmAvailable: true, dm: "いつも素敵なインテリアコーディネートをされているのですね。我が版画作品はクライアント向けの特別なアート作品として最適です。ぜひご相談ください。" },
      { handle: "modern_home_styling", name: "モダンホーム・スタイリング専門家", segment: "インテリア", keywords: ["モダン", "新築", "壁", "リフォーム"], match: 0, igLink: "https://www.instagram.com/modern_home_styling/", dmAvailable: true, dm: "新しいお住まいの空間を素敵に彩るアート作品をお探しですか？手刷りの版画は一点ものとして特別な価値があります。" },
      { handle: "minimalist_interior_jp", name: "ミニマリストインテリア専門", segment: "インテリア", keywords: ["ミニマル", "シンプル", "落ち着き", "色"], match: 0, igLink: "https://www.instagram.com/minimalist_interior_jp/", dmAvailable: true, dm: "シンプルで洗練された空間に映える、落ち着いた色調の版画作品をご紹介させていただきます。" },
      // ギフト関連
      { handle: "gift_selection_expert", name: "高級ギフト選定アドバイザー", segment: "ギフト", keywords: ["ギフト", "贈り物", "特別", "思い出", "プレゼント"], match: 0, igLink: "https://www.instagram.com/gift_selection_expert/", dmAvailable: true, dm: "特別な節目の贈り物として、一点ものの手刷り版画はいかがでしょうか。心に残る素敵なギフトになると思います。" },
      { handle: "wedding_gift_curator", name: "結婚祝い・ブライダルギフト専門", segment: "ギフト", keywords: ["結婚", "祝い", "ブライダル", "新婚"], match: 0, igLink: "https://www.instagram.com/wedding_gift_curator/", dmAvailable: true, dm: "結婚祝いとして心に残る一点もの。手刷り版画は夫婦円満の象徴となる素敵なギフトです。" },
      { handle: "anniversary_gift_jp", name: "記念日ギフト選定専門家", segment: "ギフト", keywords: ["記念日", "周年", "思い出", "特別"], match: 0, igLink: "https://www.instagram.com/anniversary_gift_jp/", dmAvailable: true, dm: "金婚式・銀婚式など大切な記念日に、思い出に残るアート作品をお勧めしています。" },
      // コレクター
      { handle: "art_collection_curator", name: "アートコレクション管理専門家", segment: "コレクター", keywords: ["コレクション", "美術", "投資", "作品"], match: 0, igLink: "https://www.instagram.com/art_collection_curator/", dmAvailable: true, dm: "貴重な美術作品の収集をお手伝いしています。手刷り版画は将来の収蔵価値も高いアイテムです。" },
      { handle: "woodblock_print_lover", name: "木版画・版画愛好家", segment: "コレクター", keywords: ["版画", "木版", "刷り", "手刷り", "版"], match: 0, igLink: "https://www.instagram.com/woodblock_print_lover/", dmAvailable: true, dm: "版画をご愛好されているなら、ぜひ当工房の手刷り作品をご覧ください。江戸の伝統を継ぐ新作をご紹介します。" },
      { handle: "contemporary_art_collector", name: "現代美術コレクター", segment: "コレクター", keywords: ["現代", "美術", "アート", "表現"], match: 0, igLink: "https://www.instagram.com/contemporary_art_collector/", dmAvailable: true, dm: "現代表現と伝統を融合させた作品に関心があります。貴工房の最新作をお聞かせください。" },
      // 文化
      { handle: "japan_culture_ambassador", name: "日本文化発信大使", segment: "文化", keywords: ["日本", "伝統", "文化", "工芸"], match: 0, igLink: "https://www.instagram.com/japan_culture_ambassador/", dmAvailable: true, dm: "日本文化の魅力を伝えるため、伝統工芸の作品を常に探しています。貴工房についてお聞かせください。" },
      { handle: "kyoto_artisan_network", name: "京都職人ネットワーク", segment: "文化", keywords: ["京都", "職人", "技", "伝統工芸"], match: 0, igLink: "https://www.instagram.com/kyoto_artisan_network/", dmAvailable: true, dm: "京都の職人さんの活動を応援しています。版画制作の様子や想いについてお聞かせいただけますか。" },
      { handle: "nature_inspired_artist", name: "自然モチーフ・アート愛好家", segment: "文化", keywords: ["自然", "モチーフ", "植物", "風景"], match: 0, igLink: "https://www.instagram.com/nature_inspired_artist/", dmAvailable: true, dm: "自然の美しさを表現した作品に関心があります。貴工房の自然モチーフ作品についてお聞かせください。" },
      // 機関
      { handle: "traditional_craft_museum", name: "伝統工芸・民芸館の学芸員", segment: "機関", keywords: ["伝統", "工芸", "民芸", "美術館"], match: 0, igLink: "https://www.instagram.com/traditional_craft_museum/", dmAvailable: true, dm: "当館では伝統工芸の後継者の作品を探しており、貴作品に強い関心をもっております。ご連絡ください。" },
      { handle: "art_gallery_tokyo", name: "東京アートギャラリー運営者", segment: "機関", keywords: ["ギャラリー", "展示", "展覧会"], match: 0, igLink: "https://www.instagram.com/art_gallery_tokyo/", dmAvailable: true, dm: "当ギャラリーでは新しい表現に挑戦するアーティストを探しています。貴工房の展示可能性についてお聞かせください。" },
      { handle: "small_gallery_network", name: "小規模ギャラリー連携ネットワーク", segment: "機関", keywords: ["ギャラリー", "ネットワーク", "連携"], match: 0, igLink: "https://www.instagram.com/small_gallery_network/", dmAvailable: true, dm: "独立系ギャラリーのネットワークです。全国の個性的な作品を取り扱っています。貴工房の作品についてお聞かせください。" },
      { handle: "pop_up_event_organizer", name: "ポップアップイベント主催者", segment: "機関", keywords: ["イベント", "展示", "期間限定"], match: 0, igLink: "https://www.instagram.com/pop_up_event_organizer/", dmAvailable: true, dm: "期間限定のポップアップイベントを企画しています。貴工房の作品出展についてお問い合わせしたいです。" },
      // 企業
      { handle: "corporate_art_program", name: "企業アートプログラム・マネージャー", segment: "企業", keywords: ["企業", "ロビー", "装飾", "オフィス"], match: 0, igLink: "https://www.instagram.com/corporate_art_program/", dmAvailable: true, dm: "企業のロビーやオフィス空間に飾るアート作品を探しています。高級感のある版画は適切かもしれません。" },
      { handle: "hotel_decoration_buyer", name: "ホテル・ラグジュアリー施設装飾担当", segment: "企業", keywords: ["ホテル", "施設", "装飾", "ラグジュアリー"], match: 0, igLink: "https://www.instagram.com/hotel_decoration_buyer/", dmAvailable: true, dm: "高級ホテルのロビーやスイートルームを飾る作品を探しています。手刷り版画はいかがでしょうか。" },
      { handle: "restaurant_designer_tokyo", name: "高級レストラン・デザイナー", segment: "企業", keywords: ["レストラン", "飲食", "装飾", "空間"], match: 0, igLink: "https://www.instagram.com/restaurant_designer_tokyo/", dmAvailable: true, dm: "上質なレストラン空間に映えるアート作品をお探しです。貴工房の作品についてお聞かせください。" },
      { handle: "office_wellness_curator", name: "ウェルネスオフィス・スペースデザイン", segment: "企業", keywords: ["オフィス", "ウェルネス", "環境", "健康"], match: 0, igLink: "https://www.instagram.com/office_wellness_curator/", dmAvailable: true, dm: "心を落ち着かせるアート環境の構築をしています。自然モチーフの版画は最適かもしれません。" },
      // その他
      { handle: "art_rental_service", name: "アートレンタルサービス運営", segment: "サービス", keywords: ["レンタル", "アート", "サービス"], match: 0, igLink: "https://www.instagram.com/art_rental_service/", dmAvailable: true, dm: "アートレンタルサービスを展開しており、様々な顧客ニーズに対応する作品を探しています。パートナーシップをお探りしたいです。" },
      { handle: "museum_shop_buyer", name: "美術館ショップ・バイヤー", segment: "機関", keywords: ["美術館", "ショップ", "販売"], match: 0, igLink: "https://www.instagram.com/museum_shop_buyer/", dmAvailable: true, dm: "美術館のミュージアムショップで取り扱う作品を探しています。貴工房の販売可能な作品についてお聞かせください。" },
      { handle: "craft_fair_organizer", name: "クラフトフェア・イベント主催", segment: "イベント", keywords: ["クラフト", "フェア", "工芸"], match: 0, igLink: "https://www.instagram.com/craft_fair_organizer/", dmAvailable: true, dm: "各地のクラフトフェアを企画しています。貴工房の出展についてお問い合わせしたいです。" },
      { handle: "art_investment_advisor", name: "アート投資顧問", segment: "投資", keywords: ["投資", "価値", "ファンド"], match: 0, igLink: "https://www.instagram.com/art_investment_advisor/", dmAvailable: true, dm: "アート投資の観点から、成長性の高いアーティスト作品を探しています。貴工房についてお聞かせください。" }
    ];

    // キーワード抽出関数（改良版：部分一致・複合語対応）
    function extractKeywords(text) {
      const lowerText = text.toLowerCase();
      const allKeywords = new Set();
      const usedKeywords = [];
      
      personaDatabase.forEach(persona => {
        persona.keywords.forEach(keyword => {
          const lowerKeyword = keyword.toLowerCase();
          // 完全一致
          if (lowerText.includes(lowerKeyword)) {
            allKeywords.add(keyword);
            usedKeywords.push(keyword);
          }
        });
      });
      
      // 入力が短い場合はデフォルトキーワードを追加
      if (usedKeywords.length === 0) {
        // テキスト長に応じてカテゴリーを推測
        if (lowerText.length > 0) {
          const keywords = ['アート', '作品', '装飾', '壁飾り'];
          keywords.forEach(k => allKeywords.add(k));
        }
      }
      
      return Array.from(allKeywords);
    }

    // マッチスコア計算関数（改良版：より寛容で精密）
    function calculateMatchScore(userKeywords, personaKeywords, inputText = '') {
      if (personaKeywords.length === 0) return 0;
      
      let score = 0;
      const lowerText = inputText.toLowerCase();
      
      // 方法1：抽出されたキーワードとペルソナキーワードの一致度
      if (userKeywords.length > 0) {
        const matches = userKeywords.filter(k => 
          personaKeywords.some(pk => pk.toLowerCase() === k.toLowerCase())
        ).length;
        score = Math.round((matches / personaKeywords.length) * 100);
      }
      
      // 方法2：入力テキスト自体がペルソナキーワードに部分一致する場合
      if (score === 0 && inputText.length > 0) {
        const partialMatches = personaKeywords.filter(pk => 
          lowerText.includes(pk.toLowerCase())
        ).length;
        if (partialMatches > 0) {
          score = Math.round((partialMatches / personaKeywords.length) * 100);
        }
      }
      
      // 方法3：何もマッチしない場合でも、テキストが存在すれば最小スコアを付与
      if (score === 0 && inputText.length > 10) {
        score = 15; // 基本スコア
      }
      
      return Math.max(score, 0);
    }

    async function startAISearch() {
      const styleInput = document.getElementById('style').value.trim();
      if (!styleInput) {
        alert('作品スタイルを入力してください');
        return;
      }

      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = `
        <div class="text-center py-20">
          <i class="fas fa-spinner fa-spin text-5xl text-amber-500"></i>
          <p class="mt-6 text-zinc-400">AIがスタイルを分析し、最適な見込み客層を抽出中...<br>キーワード解析 → マッチング → ランキング</p>
        </div>`;

      setTimeout(() => {
        // キーワード抽出
        const userKeywords = extractKeywords(styleInput);
        
        // マッチスコア計算
        const scoredPersonas = personaDatabase.map(persona => ({
          ...persona,
          match: calculateMatchScore(userKeywords, persona.keywords, styleInput)
        }));

        // スコア順にソート＆トップ10を取得
        currentLeads = scoredPersonas
          .filter(p => p.dmAvailable)  // マッチ度0でもDM可能なら表示
          .sort((a, b) => b.match - a.match)
          .slice(0, 10);

        if (currentLeads.length === 0) {
          resultsDiv.innerHTML = '<p class="text-center text-zinc-400 py-10">マッチするアカウントが見つかりませんでした。別のスタイル説明をお試しください。</p>';
          return;
        }

        let html = `<h3 class="text-lg font-medium mb-2 text-zinc-400">AIが分析した見込み客層</h3>`;
        html += `<div class="bg-zinc-800/50 border border-zinc-700 rounded-2xl p-4 mb-6">
          <p class="text-xs text-zinc-400">📊 キーワード抽出: <span class="text-amber-400">${userKeywords.join(' • ')}</span></p>
          <p class="text-xs text-zinc-400 mt-2">✓ マッチしたアカウント: <span class="font-bold text-emerald-400">${currentLeads.length}</span>件</p>
        </div>`;

        currentLeads.forEach((lead, idx) => {
          html += `
            <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-7 hover:border-amber-500/30 transition-all">
              <div class="flex justify-between items-start">
                <div class="flex-1">
                  <div class="flex items-center gap-2">
                    <span class="text-lg font-bold text-amber-400">#${idx + 1}</span>
                    <a href="${lead.igLink}" target="_blank" class="text-emerald-400 hover:text-emerald-300 font-medium">
                      @${lead.handle}
                    </a>
                  </div>
                  <h3 class="font-semibold text-lg mt-2">${lead.name}</h3>
                  <span class="text-xs bg-zinc-700 text-zinc-300 px-2 py-1 rounded mt-2 inline-block">${lead.segment}</span>
                </div>
                <div class="text-right">
                  <span class="block text-3xl font-bold text-emerald-400">${lead.match}%</span>
                  <span class="text-xs text-zinc-500">マッチ度</span>
                </div>
              </div>
              
              <p class="text-zinc-400 text-sm mt-4">📍 ${lead.name}が探しているアート作品の特徴に合致</p>
              
              <div class="mt-6 bg-zinc-950 border border-zinc-800 rounded-2xl p-6 text-[14px] leading-relaxed text-zinc-200 max-h-32 overflow-y-auto">
                ${lead.dm}
              </div>
              
              <div class="mt-6 flex gap-3">
                <a href="${lead.igLink}" target="_blank" 
                   class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-center font-medium text-sm flex items-center justify-center gap-2">
                  <i class="fab fa-instagram"></i> プロフィール確認
                </a>
                <button onclick="copyDM(this)" class="flex-1 py-4 bg-amber-500 hover:bg-amber-600 text-black rounded-2xl font-medium text-sm">
                  📋 DM文をコピー
                </button>
              </div>
            </div>`;
        });

        resultsDiv.innerHTML = html;
        document.getElementById('downloadBtn').classList.remove('hidden');
      }, 2500);
    }

    function copyDM(btn) {
      const dmText = btn.parentElement.previousElementSibling.textContent.trim();
      navigator.clipboard.writeText(dmText).then(() => {
        const original = btn.textContent;
        btn.innerHTML = '✅ コピーしました！';
        setTimeout(() => { btn.innerHTML = original; }, 2500);
      });
    }

    function downloadLeads() {
      if (currentLeads.length === 0) {
        alert('ダウンロードするリードがありません。先に「AIで需要を探す」を実行してください。');
        return;
      }

      // CSV形式で生成
      const headers = ['ハンドル', 'アカウント名', '発見理由', 'マッチ度', 'InstagramURL', 'DM例'];
      const rows = currentLeads.map(lead => [
        lead.handle,
        lead.name,
        lead.reason,
        lead.match + '%',
        lead.igLink,
        lead.dm.replace(/\n/g, ' ')
      ]);

      // CSV形式に変換
      let csv = headers.map(h => `"${h}"`).join(',') + '\n';
      csv += rows.map(row => 
        row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')
      ).join('\n');

      // ファイルダウンロード
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `sololead_accounts_${new Date().toISOString().slice(0,10)}.csv`;
      link.click();
    }
  </script>
</body>
</html>
