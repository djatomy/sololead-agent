    // ================== キーワード管理機能 ==================
    function extractAndShowKeywords() {
      const bioText = document.getElementById('bioInput').value.trim();
      if (!bioText) {
        alert('アカウント説明またはプロフ情報を入力してください。');
        return;
      }

      currentKeywords = [];
      const keywords = new Set();
      const lowerText = bioText.toLowerCase();

      // ペルソナDBから全キーワードを抽出
      personaDatabase.forEach(persona => {
        persona.keywords.forEach(keyword => {
          if (lowerText.includes(keyword.toLowerCase())) {
            keywords.add(keyword);
          }
        });
      });

      // 抽出されたキーワードがない場合、テキストから単語を抽出
      if (keywords.size === 0 && bioText.length > 5) {
        const words = bioText.split(/[\s、。，！？・]+/).filter(w => w.length > 1);
        words.slice(0, 10).forEach(w => keywords.add(w));
      }

      currentKeywords = Array.from(keywords);
      displayKeywords();
    }

    function addKeyword() {
      const input = document.getElementById('newKeywordInput');
      const keyword = input.value.trim();
      if (keyword && !currentKeywords.includes(keyword)) {
        currentKeywords.push(keyword);
        input.value = '';
        displayKeywords();
      }
    }

    function removeKeyword(keyword) {
      currentKeywords = currentKeywords.filter(k => k !== keyword);
      displayKeywords();
    }

    function displayKeywords() {
      const container = document.getElementById('keywordsList');
      if (currentKeywords.length === 0) {
        container.innerHTML = '<p class="text-zinc-500 text-sm">キーワードをここに表示します...</p>';
        return;
      }

      let html = '';
      currentKeywords.forEach((keyword, idx) => {
        html += `
          <div class="flex justify-between items-center bg-zinc-700 rounded-lg px-3 py-2">
            <span class="text-sm">${keyword}</span>
            <button onclick="removeKeywordByIndex(${idx})" class="text-red-400 hover:text-red-300 text-xs">
              <i class="fas fa-times"></i>
            </button>
          </div>`;
      });
      container.innerHTML = html;
    }

    function removeKeywordByIndex(idx) {
      currentKeywords.splice(idx, 1);
      displayKeywords();
    }

    function updateFilterUI() {
      // フィルター選択時の処理
    }

    // ================== 検索実行 ==================
    function startSimilaritySearch() {
      if (currentKeywords.length === 0) {
        alert('キーワードを抽出・設定してから検索してください。');
        return;
      }

      const resultsDiv = document.getElementById('resultsContainer');
      resultsDiv.innerHTML = `
        <div class="text-center py-20">
          <i class="fas fa-spinner fa-spin text-5xl text-blue-400"></i>
          <p class="mt-6 text-zinc-400">類似アカウントを検索中...<br>キーワード分析 → マッチング → ランキング</p>
        </div>`;

      setTimeout(() => {
        performSimilaritySearch();
      }, 2000);
    }

    function performSimilaritySearch() {
      const followerRange = document.querySelector('input[name="followerRange"]:checked').value;

      // マッチスコア計算
      const scoredPersonas = personaDatabase.map(persona => {
        const commonKeywords = persona.keywords.filter(k =>
          currentKeywords.some(ck => ck.toLowerCase() === k.toLowerCase())
        );
        const matchScore = commonKeywords.length > 0 
          ? Math.round((commonKeywords.length / persona.keywords.length) * 100)
          : 15; // デフォルトスコア

        return {
          ...persona,
          matchScore,
          commonKeywords
        };
      });

      // フォロワー数でフィルター
      let filtered = scoredPersonas;
      if (followerRange !== 'all') {
        filtered = scoredPersonas.filter(p => {
          if (followerRange === 'under10k') return p.followers < 10000;
          if (followerRange === '10k-50k') return p.followers >= 10000 && p.followers < 50000;
          if (followerRange === '50k-100k') return p.followers >= 50000 && p.followers < 100000;
          if (followerRange === '100k-plus') return p.followers >= 100000;
          return true;
        });
      }

      // スコア順にソート
      currentResults = filtered
        .sort((a, b) => b.matchScore - a.matchScore)
        .slice(0, 20);

      displayResults();
    }

    function displayResults() {
      const resultsDiv = document.getElementById('resultsContainer');

      if (currentResults.length === 0) {
        resultsDiv.innerHTML = '<p class="text-center text-zinc-400 py-10">マッチするアカウントが見つかりませんでした。別のキーワードをお試しください。</p>';
        return;
      }

      const colors = ['bg-blue-600', 'bg-purple-600', 'bg-pink-600', 'bg-green-600', 'bg-orange-600', 'bg-cyan-600', 'bg-red-600', 'bg-indigo-600'];

      currentResults.forEach((lead, idx) => {
        const followerLabel = lead.followers >= 100000 ? '10万以上' :
                             lead.followers >= 50000 ? '5-10万' :
                             lead.followers >= 10000 ? '1-5万' : '1万未満';
        
        const profileUrl = lead.igLink || ('https://instagram.com/' + lead.handle);
        const bgColor = colors[idx % colors.length];
        const initials = lead.name.substring(0, 2);

        html += '<div class="bg-zinc-800 border border-zinc-700 rounded-2xl p-6 mb-4 hover:border-blue-500/50 transition-all">';
        html += '<div class="flex justify-between items-start mb-4">';
        html += '<div class="flex-1">' +
                '<div class="flex items-center gap-4 mb-2">' +
                '<span class="text-2xl font-bold text-blue-400">#' + (idx + 1) + '</span>' +
                '<button class="link-icon flex-shrink-0 hover:opacity-80 transition-opacity border-none bg-none p-0" style="cursor:pointer;" data-url="' + profileUrl + '">' +
                '<div class="' + bgColor + ' w-12 h-12 rounded-full flex items-center justify-center text-white font-bold text-lg border-2 border-white/20 hover:border-white/40">' +
                initials + '</div></button>';
        html += '<div class="flex-1">';
        html += '<button class="link-name" style="background:none;border:none;cursor:pointer;text-align:left;padding:0;margin:0;" data-url="' + profileUrl + '" class="hover:text-blue-300 transition-colors">';
        html += '<h4 class="font-bold text-lg text-white hover:text-blue-300">' + lead.name + '</h4></button>';
        html += '<button class="link-handle" style="background:none;border:none;cursor:pointer;padding:0;margin:0;text-align:left;" data-url="' + profileUrl + '" class="text-sm text-blue-400 hover:text-blue-300 transition-colors flex items-center gap-1">';
        html += '<i class="fas fa-external-link-alt"></i> @' + lead.handle + '</button></div></div></div>';
        html += '<div class="text-right"><span class="text-3xl font-bold text-cyan-400">' + lead.matchScore + '%</span>';
        html += '<p class="text-xs text-zinc-400">マッチ度</p></div></div>';

        html += '<div class="grid grid-cols-2 gap-4 mb-4 text-sm">' +
                '<div><span class="text-zinc-500">業界:</span><p class="font-medium">' + lead.industry + '</p></div>' +
                '<div><span class="text-zinc-500">フォロワー:</span><p class="font-medium">' + lead.followers.toLocaleString() + ' <span class="text-xs text-zinc-400">(' + followerLabel + ')</span></p></div>' +
                '</div>';

        html += '<div class="bg-zinc-700 rounded-xl p-3 mb-4"><p class="text-xs text-zinc-400 mb-2">📊 共通キーワード:</p><div class="flex flex-wrap gap-2">' +
                lead.commonKeywords.map(k => '<span class="bg-blue-600/30 text-blue-300 px-2 py-1 rounded text-xs">' + k + '</span>').join('') +
                '</div></div>';

        html += '<div class="bg-zinc-900 border border-zinc-700 rounded-xl p-4 mb-4 text-sm text-zinc-300">' +
                '<p class="text-xs text-zinc-500 mb-1">💬 メッセージサンプル:</p>' +
                '<p>' + lead.dm + '</p></div>';

        html += '<div class="flex gap-2">' +
                '<button class="link-btn flex-1 bg-zinc-700 hover:bg-zinc-600 py-3 rounded-lg text-sm font-medium flex items-center justify-center gap-2 transition-colors" data-url="' + profileUrl + '">' +
                '<i class="fab fa-instagram"></i> Instagramで見る</button>' +
                '<button class="flex-1 bg-blue-600 hover:bg-blue-700 py-3 rounded-lg text-sm font-medium flex items-center justify-center gap-2 transition-colors" data-idx="' + idx + '">' +
                '📋 メッセージをコピー</button></div></div>';
      });

      resultsDiv.innerHTML = html;
      
      // リンクボタンのイベントリスナー設定
      resultsDiv.querySelectorAll('button.link-icon, button.link-name, button.link-handle, button.link-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.preventDefault();
          const url = this.getAttribute('data-url');
          if (url) {
            console.log('Opening URL:', url);
            window.open(url, '_blank');
          }
        });
      });
      
      // メッセージコピーボタンのイベントリスナー設定
      resultsDiv.querySelectorAll('button[data-idx]').forEach(btn => {
        btn.addEventListener('click', function() {
          const idx = parseInt(this.dataset.idx);
          copyToClipboard(currentResults[idx].dm);
        });
      });
      
      document.getElementById('downloadBtn').classList.remove('hidden');
    }

    function openLink(url) {
      console.log('Opening URL:', url);
      window.open(url, '_blank');
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert('コピーしました！');
      });
    }

    // ================== ダウンロード機能 ==================
    function downloadResults() {
      if (currentResults.length === 0) {
        alert('ダウンロードするデータがありません。');
        return;
      }

      const csv = [
        ['順位', 'アカウント名', 'ハンドル', '業界', 'セグメント', 'フォロワー数', 'マッチ度', '共通キーワード', 'メッセージ'],
        ...currentResults.map((lead, idx) => [
          idx + 1,
          lead.name,
          lead.handle,
          lead.industry,
          lead.segment,
          lead.followers,
          lead.matchScore + '%',
          lead.commonKeywords.join(', '),
          lead.dm
        ])
      ];

      const csvText = csv.map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');
      const blob = new Blob([csvText], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `similar_accounts_${new Date().getTime()}.csv`;
      link.click();
    }

    // ================== 初期化 ==================
    window.addEventListener('DOMContentLoaded', () => {
      initPersonaDatabase();
    });
