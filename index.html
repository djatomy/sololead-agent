<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoloLead Agent - AI版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-6xl mx-auto p-8">
    <div class="text-center mb-10">
      <h1 class="text-5xl font-bold bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent">SoloLead Agent</h1>
      <p class="text-zinc-400 mt-3">オリジナル版画アーティストのためのAIニッチ需要発掘ツール</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <div class="lg:col-span-4 bg-zinc-900 rounded-3xl p-8">
        <h2 class="text-xl font-semibold mb-6">あなたの版画情報</h2>
        <input id="ig-url" value="https://instagram.com/yourprintstudio" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-6">
        <textarea id="style" rows="4" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">和風木版画、自然・植物モチーフ、繊細な手刷り</textarea>
        
        <button onclick="startAISearch()" class="mt-8 w-full bg-gradient-to-r from-amber-500 to-orange-500 py-5 rounded-2xl text-lg font-bold">
          AIで需要を探す
        </button>
      </div>

      <div class="lg:col-span-8">
        <div id="results" class="space-y-6"></div>
      </div>
    </div>
  </div>


  <script>
    async function startAISearch() {
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = `<div class="text-center py-20"><i class="fas fa-spinner fa-spin text-5xl text-amber-500"></i><p class="mt-6 text-zinc-400">AIが丁寧に需要を分析中...</p></div>`;

      setTimeout(() => {
        const leads = [
          {
            handle: "@newhome_lover2026",
            name: "新築のお家を大切にされている方",
            reason: "新居のインテリアに心を込めたアートを探されている様子",
            match: 93,
            dm: "新居おめでとうございます。\n\nお引っ越しという大切なタイミングで、空間に長く寄り添う作品をお探しではないかと思い、ご連絡させていただきました。\n\n私は和の静けさや自然の息吹をモチーフにした手刷りの版画を制作しています。もし少しでも気になられましたら、こちらのInstagramで作品をご覧いただけますと幸いです。"
          },
          {
            handle: "@yukari_wedding",
            name: "結婚を控えていらっしゃる方",
            reason: "結婚祝いに想いのこもった一点物を探されている",
            match: 89,
            dm: "結婚おめでとうございます。\n\n大切な人生の節目に、心に残る贈り物をお探しの方が多いようですね。\n\n私は特別な日にふさわしい、一点物の版画を丁寧に手刷りしています。もしよろしければ、私の作品を一度ご覧いただけますでしょうか？"
          },
          {
            handle: "@art_collector_jp",
            name: "アートコレクターの方",
            reason: "限定作品や手刷りの美術作品への関心が高い",
            match: 87,
            dm: "いつも素敵な作品を眺めておられるのですね。\n\n実は、私も同じようにアートの本質的な美しさに魅了されています。\n\n手刷りの版画による限定作品を制作しており、あなたのコレクションに加えていただける作品があるかもしれません。"
          }
        ];

        let html = '<h3 class="text-lg font-medium mb-6 text-zinc-400">AIが発見した可能性の高い方々</h3>';

        leads.forEach(lead => {
          html += `
            <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-7 hover:border-amber-500/30 transition-all">
              <div class="flex justify-between">
                <div>
                  <span class="text-emerald-400">${lead.handle}</span>
                  <h3 class="font-semibold text-lg mt-1">${lead.name}</h3>
                </div>
                <span class="text-emerald-400 font-medium">${lead.match}%</span>
              </div>
              <p class="text-zinc-400 text-sm mt-4">${lead.reason}</p>
              
              <div class="mt-6 bg-zinc-950 border border-zinc-800 rounded-2xl p-6 text-[15px] leading-relaxed">
                ${lead.dm}
              </div>
              
              <button onclick="copyDM(this)" class="mt-6 w-full py-4 bg-zinc-800 hover:bg-amber-500 hover:text-black rounded-2xl transition-all font-medium">
                📋 このDM文をコピー
              </button>
            </div>`;
        });

        resultsDiv.innerHTML = html;
      }, 2000);
    }

    function copyDM(btn) {
      const dmText = btn.previousElementSibling.textContent.trim();
      navigator.clipboard.writeText(dmText).then(() => {
        btn.innerHTML = '✅ コピーしました！';
        setTimeout(() => {
          btn.innerHTML = '📋 このDM文をコピー';
        }, 2500);
      });
    }
  </script>
</body>
</html>
