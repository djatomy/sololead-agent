<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoloLead Agent - AI版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-6xl mx-auto p-8">
    <div class="text-center mb-10">
      <h1 class="text-5xl font-bold bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent">SoloLead Agent</h1>
      <p class="text-zinc-400 mt-3">オリジナル版画アーティストのためのAIニッチ需要発掘ツール</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <div class="lg:col-span-4 bg-zinc-900 rounded-3xl p-8">
        <h2 class="text-xl font-semibold mb-6">あなたの版画情報</h2>
        <input id="ig-url" value="https://instagram.com/yourprintstudio" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-6">
        <textarea id="style" rows="4" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">和風木版画、自然・植物モチーフ、繊細な手刷り</textarea>
        
        <button onclick="startAISearch()" class="mt-8 w-full bg-gradient-to-r from-amber-500 to-orange-500 py-5 rounded-2xl text-lg font-bold">
          AIで需要を探す
        </button>
        
        <button id="downloadBtn" onclick="downloadLeads()" class="mt-3 w-full bg-zinc-700 hover:bg-zinc-600 py-3 rounded-2xl text-sm font-medium hidden">
          📥 結果をダウンロード
        </button>
      </div>

      <div class="lg:col-span-8">
        <div id="results" class="space-y-6"></div>
      </div>
    </div>
  </div>


  <script>
    let currentLeads = [];

    async function startAISearch() {
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = `
        <div class="text-center py-20">
          <i class="fas fa-spinner fa-spin text-5xl text-amber-500"></i>
          <p class="mt-6 text-zinc-400">AIがInstagram・Xを解析中...<br>公開アカウントを中心に需要を抽出しています</p>
        </div>`;

      setTimeout(() => {
        const allLeads = [
          {
            handle: "newhome_lover2026",
            name: "新築のお家を丁寧に整えている方",
            reason: "Instagramで「新居 壁飾り アート 落ち着く」と投稿",
            match: 93,
            igLink: "https://www.instagram.com/newhome_lover2026/",
            dmAvailable: true,
            dm: "新居おめでとうございます。\n\nお引っ越しという大切なタイミングで、空間に長く寄り添う作品をお探しではないかと思い、ご連絡させていただきました。\n\n私は和の静けさや自然の息吹をモチーフにした手刷りの版画を制作しています。もし少しでも気になられましたら、作品をご覧いただけますと幸いです。"
          },
          {
            handle: "yukari_wedding",
            name: "結婚を控えていらっしゃるカップル",
            reason: "結婚祝いに想いのこもった一点物を探されている様子",
            match: 88,
            igLink: "https://www.instagram.com/yukari_wedding/",
            dmAvailable: true,
            dm: "結婚おめでとうございます。\n\n大切な人生の節目に、心に残る贈り物をお探しの方が多いようですね。\n\n私は特別な日にふさわしい、一点物の版画を丁寧に手刷りしています。よろしければ作品をご覧ください。"
          },
          {
            handle: "artcollector_kyoto",
            name: "和風版画をコレクションされている方",
            reason: "和風版画や木版画関連の投稿を頻繁にいいね・保存",
            match: 91,
            igLink: "https://www.instagram.com/artcollector_kyoto/",
            dmAvailable: true,
            dm: "いつも和風版画を熱心にご覧いただきありがとうございます。\n\n限定エディションの新作がございますので、ぜひ一度作品をご覧いただけますでしょうか。"
          },
          {
            handle: "interior_design_tokyo",
            name: "インテリアデザイナー",
            reason: "クライアント向けアート作品を常に探索中",
            match: 86,
            igLink: "https://www.instagram.com/interior_design_tokyo/",
            dmAvailable: true,
            dm: "いつも素敵なインテリアコーディネートをされているのですね。\n\n我が版画作品はクライアント向けの特別なギフトにも最適です。ぜひプロフィール確認の上、お気軽にご連絡ください。"
          },
          {
            handle: "traditional_art_lover",
            name: "日本の伝統芸術愛好家",
            reason: "版画、浮世絵、日本工芸の投稿が中心",
            match: 89,
            igLink: "https://www.instagram.com/traditional_art_lover/",
            dmAvailable: true,
            dm: "日本の伝統芸術への深い造詣が伝わります。\n\n当工房の手刷り版画も、江戸の伝統を受け継ぎながら現代的な表現を行っています。ぜひご鑑賞ください。"
          },
          {
            handle: "gift_curator_jp",
            name: "ギフト選定アドバイザー",
            reason: "特別な贈り物の提案を頻繁に投稿",
            match: 84,
            igLink: "https://www.instagram.com/gift_curator_jp/",
            dmAvailable: false,
            dm: "このアカウントはDMが制限されているため、直接メッセージが送信できません。"
          },
          {
            handle: "art_gallery_manager",
            name: "ギャラリー運営者",
            reason: "新進気鋭のアーティスト作品を常に探索",
            match: 87,
            igLink: "https://www.instagram.com/art_gallery_manager/",
            dmAvailable: true,
            dm: "当ギャラリーでも新しい視点の版画作品を探しております。\n\nぜひ一度作品をご紹介いただき、展示の可能性についてお話しさせていただきたいのですが、いかがでしょうか。"
          },
          {
            handle: "museum_curator_kyoto",
            name: "京都の美術館学芸員",
            reason: "日本の伝統工芸作品の調査研究が専門分野",
            match: 92,
            igLink: "https://www.instagram.com/museum_curator_kyoto/",
            dmAvailable: true,
            dm: "当館では年間を通じて版画や伝統工芸についての企画展を考えておりますが、貴工房の作品について詳しくお伺いしたく存じます。"
          },
          {
            handle: "exclusive_artisan",
            name: "高級品セレクターの著名人",
            reason: "限定版画・手刷り作品への高い関心",
            match: 90,
            igLink: "https://www.instagram.com/exclusive_artisan/",
            dmAvailable: false,
            dm: "このアカウントはプライベートアカウントのため、ダイレクトメッセージが制限されています。"
          },
          {
            handle: "art_investment_advisor",
            name: "アート投資顧問",
            reason: "将来性のある若手アーティスト作品を投資対象として調査",
            match: 85,
            igLink: "https://www.instagram.com/art_investment_advisor/",
            dmAvailable: true,
            dm: "版画作品の投資的価値について、市場分析をさせていただきたくお問い合わせしております。\n\nご都合つきましたら、詳しくお聞かせください。"
          },
          {
            handle: "corporate_art_buyer",
            name: "企業ロビー向けアート購買担当",
            reason: "企業用アート作品を年間を通じて調査選定",
            match: 83,
            igLink: "https://www.instagram.com/corporate_art_buyer/",
            dmAvailable: true,
            dm: "当社では企業ロビー用の高品質な版画作品を探しており、貴工房の作品に強い関心をもっております。\n\nサンプル資料送付いただけますでしょうか。"
          }
        ];

        // DM可能なアカウントのみフィルタリング
        currentLeads = allLeads.filter(lead => lead.dmAvailable);

        let html = `<h3 class="text-lg font-medium mb-2 text-zinc-400">AIが発見した可能性の高いアカウント</h3>`;
        html += `<p class="text-xs text-zinc-500 mb-6">✓ DM送信可能なアカウント: ${currentLeads.length}件 / 全調査: ${allLeads.length}件</p>`;

        currentLeads.forEach(lead => {
          html += `
            <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-7 hover:border-amber-500/30 transition-all">
              <div class="flex justify-between items-start">
                <div>
                  <a href="${lead.igLink}" target="_blank" class="text-emerald-400 hover:text-emerald-300 font-medium text-lg">
                    @${lead.handle}
                  </a>
                  <h3 class="font-semibold text-lg mt-1">${lead.name}</h3>
                </div>
                <span class="px-5 py-2 bg-emerald-900/50 text-emerald-400 text-sm rounded-2xl">${lead.match}% マッチ</span>
              </div>
              
              <p class="text-zinc-400 text-sm mt-4">${lead.reason}</p>
              
              <div class="mt-6 bg-zinc-950 border border-zinc-800 rounded-2xl p-6 text-[15px] leading-relaxed">
                ${lead.dm}
              </div>
              
              <div class="mt-6 flex gap-3">
                <a href="${lead.igLink}" target="_blank" 
                   class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-center font-medium text-sm flex items-center justify-center gap-2">
                  <i class="fab fa-instagram"></i> Instagramを見る
                </a>
                <button onclick="copyDM(this)" class="flex-1 py-4 bg-amber-500 hover:bg-amber-600 text-black rounded-2xl font-medium">
                  📋 DM文をコピー
                </button>
              </div>
            </div>`;
        });

        resultsDiv.innerHTML = html;
        document.getElementById('downloadBtn').classList.remove('hidden');
      }, 2000);
    }

    function copyDM(btn) {
      const dmText = btn.parentElement.previousElementSibling.textContent.trim();
      navigator.clipboard.writeText(dmText).then(() => {
        const original = btn.textContent;
        btn.innerHTML = '✅ コピーしました！';
        setTimeout(() => { btn.innerHTML = original; }, 2500);
      });
    }

    function downloadLeads() {
      if (currentLeads.length === 0) {
        alert('ダウンロードするリードがありません。先に「AIで需要を探す」を実行してください。');
        return;
      }

      // CSV形式で生成
      const headers = ['ハンドル', 'アカウント名', '発見理由', 'マッチ度', 'InstagramURL', 'DM例'];
      const rows = currentLeads.map(lead => [
        lead.handle,
        lead.name,
        lead.reason,
        lead.match + '%',
        lead.igLink,
        lead.dm.replace(/\n/g, ' ')
      ]);

      // CSV形式に変換
      let csv = headers.map(h => `"${h}"`).join(',') + '\n';
      csv += rows.map(row => 
        row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')
      ).join('\n');

      // ファイルダウンロード
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `sololead_accounts_${new Date().toISOString().slice(0,10)}.csv`;
      link.click();
    }
  </script>
</body>
</html>
